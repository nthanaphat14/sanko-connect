{% extends "base.html" %}

{% block content %}
<h2>ข่าวสาร</h2>

{% for news in news_list %}
<div class="card mb-3">
    <div class="card-body">
        <h5>{{ news.title }}</h5>
        <p>{{ news.summary }}</p>
        <small>{{ news.date }} | {{ news.category }}</small>
    </div>
</div>
{% endfor %}

{% endblock %}
