{% extends "base.html" %}

{% block title %}Login - SANKO CONNECT{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px;">
    <div class="card card-box">
        <div class="card-body">
            <h3 class="mb-3">Login</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">รหัสพนักงาน</label>
                    <input type="text" name="emp_id" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">รหัสผ่าน</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
            </form>

            <div class="mt-3 d-flex justify-content-between flex-wrap gap-2">
                <a href="{{ url_for('auth.register') }}">สมัครใช้งาน</a>
                <a href="{{ url_for('auth.forgot_password') }}">ลืมรหัสผ่าน</a>
                <a href="{{ url_for('auth.resend_verification') }}">ส่งอีเมลยืนยันอีกครั้ง</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
